<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BesiCalc v4 Pro - Gio_017 Creator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2641/2641434.png">

    <style>
        :root { --primary: #ffcc00; --bg: #f0f2f5; --card-bg: #ffffff; --text: #1a1a1a; --border: #ddd; --header-bg: #1a1a1a; }
        .dark-mode { --bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; --border: #333; --header-bg: #000000; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        #printHeader { display: none; text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .card, .cart { background: var(--card-bg); max-width: 600px; margin: auto; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { background: var(--header-bg); color: var(--primary); margin: -25px -25px 25px -25px; padding: 20px; text-align: center; border-radius: 15px 15px 0 0; }
        .dark-toggle { position: fixed; bottom: 20px; right: 20px; background: var(--primary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; background: var(--card-bg); color: var(--text); font-size: 16px; box-sizing: border-box; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-add { background: var(--primary); color: #000; border: none; width: 100%; padding: 18px; margin-top: 25px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid var(--primary); padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
        .item-spec { display: block; font-size: 11px; color: #666; margin-top: 4px; line-height: 1.2; }
        .summary-box { background: var(--header-bg); color: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; border: 2px solid var(--primary); }
        .grand-total { font-size: 28px; color: var(--primary); font-weight: bold; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-pdf { background: #007bff; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media print {
            .dark-toggle, .card, .action-btns, .btn-add, .btn-del, th:last-child, td:last-child { display: none !important; }
            #printHeader { display: block !important; }
            body { background: white; color: black; padding: 0; }
            .cart { box-shadow: none; border: 1px solid #eee; width: 100%; max-width: none; margin: 0; }
            .summary-box { background: #f9f9f9 !important; color: #000 !important; border: 2px solid #000; }
            .grand-total { color: #000 !important; }
            .item-spec { color: #333 !important; }
        }
    </style>
</head>
<body>

<div id="printHeader">
    <h1 style="margin:0;">Laporan Estimasi Material</h1>
    <p style="margin:5px 0;">Dibuat oleh: <strong>Gio_017 Creator</strong></p>
    <p id="printDate" style="font-size: 12px;"></p>
</div>

<div class="dark-toggle" onclick="toggleDarkMode()">🌓</div>

<div class="card">
    <div class="header">
        <h2 style="margin:0">BesiCalc v4 Pro 🏗️</h2>
        <small>Database Material & Estimator Berat</small>
    </div>

    <label>Jenis Material</label>
    <select id="jenisBesi" onchange="renderInputs()">
        <optgroup label="Besi & Baja">
            <option value="betonPolos">Besi Beton Polos</option>
            <option value="betonUlir">Besi Beton Ulir (Deformed)</option>
            <option value="hollow">Besi Hollow</option>
            <option value="siku">Besi Siku</option>
            <option value="wf">Baja WF / H-Beam</option>
            <option value="nako">Besi Firkan / Nako</option>
        </optgroup>
        <optgroup label="Plat & Atap">
            <option value="platBordes">Plat Bordes</option>
            <option value="plat">Plat Besi Polos</option>
            <option value="platLubang">Plat Lubang (Perforated)</option>
            <option value="spandek">Atap Spandek</option>
            <option value="bondek">Bondek Cor</option>
            <option value="expanded">Expanded Metal</option>
        </optgroup>
        <optgroup label="Pipa & Spesial">
            <option value="pipa">Pipa Besi</option>
            <option value="stainles">Stainless Steel 304</option>
            <option value="alumunium">Aluminium</option>
            <option value="pvc">Pipa PVC</option>
            <option value="hdpe">Pipa HDPE</option>
            <option value="wiremesh">Wiremesh (Lembar Standar)</option>
        </optgroup>
    </select>

    <div id="inputDynamic" class="grid-inputs"></div>

    <div class="grid-inputs">
        <div><label id="lblPanjang">Panjang (m)</label><input type="number" id="panjang" step="0.01"></div>
        <div><label>Jumlah (Qty)</label><input type="number" id="qty" value="1" min="1"></div>
    </div>

    <button class="btn-add" onclick="tambahKeDaftar()">+ TAMBAH KE DAFTAR</button>
</div>

<div class="cart">
    <h3>📋 Daftar Hitungan</h3>
    <table>
        <thead>
            <tr>
                <th>Item & Spesifikasi</th>
                <th>Qty</th>
                <th>Berat Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
    </table>

    <div class="summary-box">
        <span>TOTAL BERAT KESELURUHAN</span><br>
        <span id="totalBrt" class="grand-total">0.00 kg</span>
    </div>
    
    <div class="action-btns">
        <button class="btn-wa" onclick="bagikanWA()">📲 WhatsApp</button>
        <button class="btn-pdf" onclick="cetakPDF()">📑 Cetak PDF</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }

    const config = {
        betonPolos: [{id: 'd', label: 'Diameter (mm)'}],
        betonUlir: [{id: 'd', label: 'Diameter (mm)'}],
        hollow: [{id: 'w', label: 'Lebar (mm)'}, {id: 'h', label: 'Tinggi (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        pipa: [{id: 'd', label: 'Dia. Luar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        stainles: [{id: 'd', label: 'Dia. Luar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        alumunium: [{id: 'd', label: 'Diameter (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        siku: [{id: 'l', label: 'Lebar Siku (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        platBordes: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        plat: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        platLubang: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        spandek: [{id: 't', label: 'Tebal (mm)'}],
        bondek: [{id: 't', label: 'Tebal (mm)'}],
        wf: [{id: 'h', label: 'Tinggi (mm)'}, {id: 'b', label: 'Lebar (mm)'}, {id: 't1', label: 'Tebal Bdn'}, {id: 't2', label: 'Tebal Syp'}],
        nako: [{id: 's', label: 'Sisi (mm)'}],
        wiremesh: [{id: 'm', label: 'Tipe M (Misal: 8)'}],
        pvc: [{id: 'd', label: 'Dia. Luar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        hdpe: [{id: 'd', label: 'Dia. Luar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        expanded: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}]
    };

    let list = JSON.parse(localStorage.getItem('besiListV4')) || [];
    let isDark = localStorage.getItem('darkModeV4') === 'true';

    function toggleDarkMode() {
        isDark = !isDark;
        document.body.classList.toggle('dark-mode', isDark);
        localStorage.setItem('darkModeV4', isDark);
    }

    function renderInputs() {
        const jenis = document.getElementById('jenisBesi').value;
        const container = document.getElementById('inputDynamic');
        container.innerHTML = '';
        config[jenis].forEach(inp => {
            container.innerHTML += `<div><label>${inp.label}</label><input type="number" id="${inp.id}" step="0.01" placeholder="0"></div>`;
        });
        
        let defPjg = 6;
        if(['betonPolos', 'betonUlir', 'wf'].includes(jenis)) defPjg = 12;
        else if(jenis === 'wiremesh') defPjg = 5.4; 
        else if(['plat', 'platBordes', 'expanded', 'platLubang'].includes(jenis)) defPjg = 2.4;
        else if(jenis === 'hdpe') defPjg = 100;
        
        document.getElementById('panjang').value = defPjg;
    }

    function hitungBerat() {
        const jenis = document.getElementById('jenisBesi').value;
        const L = parseFloat(document.getElementById('panjang').value) || 0;
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        let bM = 0;

        if (jenis === 'betonPolos' || jenis === 'betonUlir') bM = 0.006165 * Math.pow(getV('d'), 2);
        else if (jenis === 'hollow') bM = (getV('w') + getV('h')) * 2 * getV('t') * 0.00785;
        else if (jenis === 'pipa' || jenis === 'stainles') bM = (getV('d') - getV('t')) * getV('t') * (jenis === 'pipa' ? 0.02466 : 0.02491);
        else if (jenis === 'siku') bM = (getV('l') + getV('l') - getV('t')) * getV('t') * 0.00785;
        else if (jenis === 'plat') bM = getV('t') * getV('l') * 7.85;
        else if (jenis === 'platBordes') bM = getV('t') * getV('l') * 7.85 * 1.05;
        else if (jenis === 'wf') bM = ((getV('h') * getV('t1')) + (2 * getV('b') * getV('t2'))) * 0.00785;
        // ... rumus lainnya tetap sama ...
        else if (jenis === 'nako') bM = Math.pow(getV('s'), 2) * 0.00785;
        else if (jenis === 'wiremesh') bM = (Math.pow(getV('m'), 2) * 0.00617 * 2.1 * 5.4 * 10.5) / 5.4;

        return bM * L;
    }

    function tambahKeDaftar() {
        const jenis = document.getElementById('jenisBesi').value;
        const beratSatuan = hitungBerat();
        const qty = parseInt(document.getElementById('qty').value) || 0;
        if (beratSatuan <= 0 || qty <= 0) return alert("Isi semua dimensi!");

        let specArr = [];
        config[jenis].forEach(inp => {
            const val = document.getElementById(inp.id).value;
            specArr.push(`${inp.label.split('(')[0].trim()}: ${val}mm`);
        });

        list.push({ 
            nama: document.getElementById('jenisBesi').options[document.getElementById('jenisBesi').selectedIndex].text, 
            berat: beratSatuan * qty, qty, 
            pjg: document.getElementById('panjang').value,
            spek: specArr.join(", ")
        });
        updateUI();
    }

    function updateUI() {
        const tbody = document.getElementById('tabelBody');
        tbody.innerHTML = '';
        let total = 0;
        list.forEach((x, i) => {
            total += x.berat;
            tbody.innerHTML += `<tr><td><strong>${x.nama}</strong><span class="item-spec">${x.pjg}m | ${x.spek}</span></td><td>${x.qty}</td><td>${x.berat.toFixed(2)}kg</td><td><button onclick="hapus(${i})" style="color:red; border:none; background:none; cursor:pointer;">🗑️</button></td></tr>`;
        });
        document.getElementById('totalBrt').innerText = total.toFixed(2) + " kg";
        localStorage.setItem('besiListV4', JSON.stringify(list));
    }

    function hapus(i) { list.splice(i, 1); updateUI(); }
    function cetakPDF() { document.getElementById('printDate').innerText = "Dicetak: " + new Date().toLocaleString(); window.print(); }
    function bagikanWA() {
        let txt = "*ESTIMASI MATERIAL*\n";
        list.forEach(x => txt += `• *${x.nama}* (${x.pjg}m)\n  ${x.spek} | Qty: ${x.qty} | *${x.berat.toFixed(2)}kg*\n\n`);
        txt += `*TOTAL: ${document.getElementById('totalBrt').innerText}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
    }

    if (isDark) document.body.classList.add('dark-mode');
    renderInputs();
    updateUI();
</script>
</body>
</html>
