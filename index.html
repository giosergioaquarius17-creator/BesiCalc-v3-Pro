<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BesiCalc v4 Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <style>
        :root { --primary: #ffcc00; --bg: #f0f2f5; --card-bg: #ffffff; --text: #1a1a1a; --border: #ddd; }
        .dark-mode { --bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; --border: #333; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        .card, .cart { background: var(--card-bg); max-width: 600px; margin: auto; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        
        .dark-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text); font-size: 16px; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-add { background: var(--primary); color: #000; border: none; width: 100%; padding: 16px; margin-top: 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid var(--primary); padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .summary-box { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .grand-total { font-size: 24px; color: var(--primary); font-weight: bold; }
        .price-total { font-size: 18px; color: #4ade80; }
        
        .btn-del { color: #ff4d4d; border: none; background: none; cursor: pointer; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="dark-toggle" onclick="toggleDarkMode()">🌓</div>

<div class="card">
    <div class="header">
        <h2 style="margin:0">BesiCalc v4 Pro 🏗️</h2>
        <small>Estimator Berat & Harga Pasar</small>
    </div>

    <label>Jenis Material</label>
    <select id="jenisBesi" onchange="renderInputs()">
        <option value="beton">Besi Beton</option>
        <option value="hollow">Besi Hollow</option>
        <option value="plat">Plat Besi</option>
        <option value="wf">Baja WF / H-Beam</option>
    </select>

    <div id="inputDynamic" class="grid-inputs"></div>

    <div class="grid-inputs">
        <div>
            <label>Panjang (m)</label>
            <input type="number" id="panjang" value="12">
        </div>
        <div>
            <label>Jumlah (Qty)</label>
            <input type="number" id="qty" value="1">
        </div>
    </div>

    <label>Harga per Kg (Rp)</label>
    <input type="number" id="hargaManual" placeholder="Contoh: 15000" oninput="savePrice()">

    <button class="btn-add" onclick="tambahKeDaftar()">+ TAMBAH KE DAFTAR</button>
</div>

<div class="cart" style="margin-top:20px;">
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Berat</th>
                <th>Harga Est.</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
    </table>

    <div class="summary-box">
        <div>Total Berat: <span id="totalBrt" class="grand-total">0 kg</span></div>
        <div style="margin-top:10px;">Total Biaya: <span id="totalHrg" class="price-total">Rp 0</span></div>
    </div>

    <div class="action-btns">
        <button class="btn-wa" onclick="bagikanWA()">📲 WhatsApp</button>
        <button onclick="hapusSemua()" style="background:#666; color:white; border:none; border-radius:8px; cursor:pointer;">🗑️ Reset</button>
    </div>
</div>

<script>
    let list = JSON.parse(localStorage.getItem('besiList')) || [];
    let isDark = localStorage.getItem('darkMode') === 'true';

    function toggleDarkMode() {
        isDark = !isDark;
        document.body.classList.toggle('dark-mode', isDark);
        localStorage.setItem('darkMode', isDark);
    }

    function savePrice() {
        localStorage.setItem('lastPrice', document.getElementById('hargaManual').value);
    }

    const config = {
        beton: [{id: 'd', label: 'Diameter (mm)'}],
        hollow: [{id: 'w', label: 'Lebar (mm)'}, {id: 'h', label: 'Tinggi (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        plat: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        wf: [{id: 'h', label: 'Tinggi (mm)'}, {id: 'b', label: 'Lebar (mm)'}, {id: 't1', label: 'Tebal Bdn'}, {id: 't2', label: 'Tebal Syp'}]
    };

    function renderInputs() {
        const jenis = document.getElementById('jenisBesi').value;
        const container = document.getElementById('inputDynamic');
        container.innerHTML = '';
        config[jenis].forEach(inp => {
            container.innerHTML += `<div><label>${inp.label}</label><input type="number" id="${inp.id}"></div>`;
        });
        document.getElementById('panjang').value = (jenis === 'beton' || jenis === 'wf') ? 12 : 6;
    }

    function hitungBerat() {
        const jenis = document.getElementById('jenisBesi').value;
        const L = parseFloat(document.getElementById('panjang').value) || 0;
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        let bM = 0;

        if (jenis === 'beton') bM = 0.006165 * Math.pow(getV('d'), 2);
        else if (jenis === 'hollow') bM = (getV('w') + getV('h')) * 2 * getV('t') * 0.00785;
        else if (jenis === 'plat') bM = getV('t') * getV('l') * 7.85;
        else if (jenis === 'wf') bM = ((getV('h') * getV('t1')) + (2 * getV('b') * getV('t2'))) * 0.00785;

        return bM * L;
    }

    function tambahKeDaftar() {
        const harga = parseFloat(document.getElementById('hargaManual').value) || 0;
        const beratSatuan = hitungBerat();
        const qty = parseInt(document.getElementById('qty').value) || 0;
        const beratTotal = beratSatuan * qty;
        
        if (beratTotal <= 0) return alert("Isi dimensi!");

        const item = {
            nama: document.getElementById('jenisBesi').options[document.getElementById('jenisBesi').selectedIndex].text,
            berat: beratTotal,
            hargaEst: beratTotal * harga,
            qty: qty
        };

        list.push(item);
        updateUI();
    }

    function updateUI() {
        const tbody = document.getElementById('tabelBody');
        tbody.innerHTML = '';
        let totalBrt = 0, totalHrg = 0;

        list.forEach((x, i) => {
            totalBrt += x.berat;
            totalHrg += x.hargaEst;
            tbody.innerHTML += `<tr>
                <td>${x.nama} (x${x.qty})</td>
                <td>${x.berat.toFixed(2)}kg</td>
                <td>Rp ${x.hargaEst.toLocaleString()}</td>
                <td><button class="btn-del" onclick="hapus(${i})">🗑️</button></td>
            </tr>`;
        });

        document.getElementById('totalBrt').innerText = totalBrt.toFixed(2) + " kg";
        document.getElementById('totalHrg').innerText = "Rp " + totalHrg.toLocaleString();
        localStorage.setItem('besiList', JSON.stringify(list));
    }

    function hapus(i) { list.splice(i, 1); updateUI(); }
    function hapusSemua() { if(confirm("Hapus semua data?")) { list = []; updateUI(); } }

    function bagikanWA() {
        let txt = "*ESTIMASI HARGA BESI*\n";
        list.forEach(x => txt += `\n- ${x.nama} (x${x.qty}): ${x.berat.toFixed(2)}kg | Rp${x.hargaEst.toLocaleString()}`);
        txt += `\n\n*TOTAL: Rp ${document.getElementById('totalHrg').innerText}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
    }

    // Init
    if (isDark) document.body.classList.add('dark-mode');
    document.getElementById('hargaManual').value = localStorage.getItem('lastPrice') || "";
    renderInputs();
    updateUI();
</script>

</body>
</html>
