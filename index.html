<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BesiCalc Pro v3 - All Materials</title>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --accent: #ffae00; --blue: #007bff; --green: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; max-width: 600px; margin: auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 6px solid var(--primary); }
        .header { background: var(--dark); color: var(--primary); padding: 20px; text-align: center; }
        .content { padding: 25px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; color: #333; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); outline: none; background: #fffdf5; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .btn-add { background: var(--dark); color: var(--primary); border: none; width: 100%; padding: 16px; margin-top: 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; }
        
        .cart { margin-top: 25px; background: white; border-radius: 12px; padding: 20px; max-width: 600px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { border-bottom: 2px solid var(--primary); padding: 12px; text-align: left; color: #666; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .total-box { background: var(--dark); color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .grand-total { font-size: 28px; color: var(--primary); font-weight: bold; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-share { background: var(--green); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-print { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-del { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 18px; }

        @media print {
            .card, .btn-add, .action-buttons, .btn-del, th:last-child, td:last-child { display: none; }
            .cart { width: 100%; max-width: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">BesiCalc v3 Pro 🏗️</h2>
        <small>Database Material Lengkap</small>
    </div>
    
    <div class="content">
        <label>Pilih Jenis Material</label>
        <select id="jenisBesi" onchange="renderInputs()">
            <optgroup label="Besi Umum">
                <option value="beton">Besi Beton (Polos/Ulir)</option>
                <option value="hollow">Besi Hollow (Kotak)</option>
                <option value="pipa">Pipa Besi / Round Tube</option>
                <option value="siku">Besi Siku (L-Beam)</option>
            </optgroup>
            <optgroup label="Plat & Sheet">
                <option value="plat">Plat Besi Polos</option>
                <option value="bordes">Plat Bordes (Kembang)</option>
            </optgroup>
            <optgroup label="Baja Konstruksi">
                <option value="wf">Baja WF / H-Beam</option>
                <option value="unp">Baja UNP (Kanal U)</option>
                <option value="cnp">Baja CNP (Kanal C)</option>
                <option value="sikulubang">Siku Lubang (Rak)</option>
            </optgroup>
        </select>

        <div id="inputDynamic" class="grid-inputs" style="margin-top:10px;"></div>

        <div class="grid-inputs">
            <div>
                <label>Panjang (m)</label>
                <input type="number" id="panjang" value="6" step="0.1">
            </div>
            <div>
                <label>Jumlah (Qty)</label>
                <input type="number" id="qty" value="1">
            </div>
        </div>

        <button class="btn-add" onclick="tambahKeDaftar()">+ Tambah ke Daftar</button>
    </div>
</div>

<div class="cart">
    <table id="tabelItem">
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Berat</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="total-box">
        <span style="font-size: 13px; text-transform: uppercase;">Total Berat Keseluruhan</span><br>
        <span class="grand-total" id="grandTotal">0.00 kg</span>
    </div>

    <div class="action-buttons">
        <button class="btn-share" onclick="bagikanWA()">📲 WhatsApp</button>
        <button class="btn-print" onclick="window.print()">📑 Cetak / PDF</button>
    </div>
</div>

<script>
    const config = {
        beton: [{id: 'd', label: 'Diameter (mm)'}],
        hollow: [{id: 'w', label: 'Lebar (mm)'}, {id: 'h', label: 'Tinggi (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        pipa: [{id: 'd', label: 'Dia. Luar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        plat: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        bordes: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        siku: [{id: 'l', label: 'Lebar Siku (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        wf: [{id: 'h', label: 'Tinggi H (mm)'}, {id: 'b', label: 'Lebar B (mm)'}, {id: 't1', label: 'Tebal Badan (mm)'}, {id: 't2', label: 'Tebal Sayap (mm)'}],
        unp: [{id: 'h', label: 'Tinggi (mm)'}, {id: 'b', label: 'Lebar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        cnp: [{id: 'h', label: 'Tinggi (mm)'}, {id: 'b', label: 'Lebar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        sikulubang: [{id: 'l', label: 'Lebar Siku (mm)'}, {id: 't', label: 'Tebal (mm)'}]
    };

    let list = [];

    function renderInputs() {
        const jenis = document.getElementById('jenisBesi').value;
        const container = document.getElementById('inputDynamic');
        container.innerHTML = '';
        config[jenis].forEach(inp => {
            container.innerHTML += `<div><label>${inp.label}</label><input type="number" id="${inp.id}"></div>`;
        });
    }

    function hitungBerat() {
        const jenis = document.getElementById('jenisBesi').value;
        const L = parseFloat(document.getElementById('panjang').value) || 0;
        let bM = 0; 

        const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;

        if (jenis === 'beton') bM = 0.006165 * Math.pow(getVal('d'), 2);
        else if (jenis === 'hollow') bM = (getVal('w') + getVal('h')) * 2 * getVal('t') * 0.00785;
        else if (jenis === 'pipa') bM = (getVal('d') - getVal('t')) * getVal('t') * 0.02466;
        else if (jenis === 'plat') bM = getVal('t') * getVal('l') * 7.85;
        else if (jenis === 'bordes') bM = (getVal('t') * 7.85 + 2.5) * getVal('l'); // +2.5kg per m2 untuk kembang
        else if (jenis === 'siku' || jenis === 'sikulubang') bM = (getVal('l') + getVal('l') - getVal('t')) * getVal('t') * 0.00785;
        else if (jenis === 'wf') bM = ((getVal('h') * getVal('t1')) + (2 * getVal('b') * getVal('t2'))) * 0.00785;
        else if (jenis === 'unp') bM = (getVal('h') + (2 * getVal('b'))) * getVal('t') * 0.00785;
        else if (jenis === 'cnp') bM = (getVal('h') + (2 * getVal('b')) + 30) * getVal('t') * 0.00785;

        return bM * L;
    }

    function tambahKeDaftar() {
        const select = document.getElementById('jenisBesi');
        const jenisText = select.options[select.selectedIndex].text;
        const qty = parseInt(document.getElementById('qty').value) || 0;
        const pjg = document.getElementById('panjang').value;
        const beratTotal = hitungBerat() * qty;

        if (beratTotal <= 0) return alert("Lengkapi semua dimensi!");

        list.push({ name: jenisText, qty, pjg, berat: beratTotal });
        updateTabel();
    }

    function updateTabel() {
        const tbody = document.querySelector('#tabelItem tbody');
        tbody.innerHTML = '';
        let grand = 0;
        list.forEach((x, i) => {
            grand += x.berat;
            tbody.innerHTML += `<tr>
                <td><strong>${x.name}</strong><br><small>${x.pjg} meter</small></td>
                <td>${x.qty}</td>
                <td>${x.berat.toFixed(2)} kg</td>
                <td class="btn-del"><button onclick="hapus(${i})">🗑️</button></td>
            </tr>`;
        });
        document.getElementById('grandTotal').innerText = grand.toFixed(2) + " kg";
    }

    function hapus(i) { list.splice(i, 1); updateTabel(); }

    function bagikanWA() {
        if (list.length === 0) return alert("Daftar kosong!");
        let text = "*HASIL HITUNG MATERIAL BESI*\n";
        let total = 0;
        list.forEach(x => {
            text += `\n- ${x.name} (${x.pjg}m)\n  Qty: ${x.qty} | Berat: *${x.berat.toFixed(2)} kg*`;
            total += x.berat;
        });
        text += `\n\n*TOTAL BERAT: ${total.toFixed(2)} kg*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    renderInputs();
</script>

</body>
</html>
