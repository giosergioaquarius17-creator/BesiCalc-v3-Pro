<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BesiCalc v4 Pro - Technical Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2641/2641434.png">

    <style>
        :root { 
            --primary: #ffcc00; 
            --bg: #f0f2f5; 
            --card-bg: #ffffff; 
            --text: #1a1a1a; 
            --border: #ddd; 
            --header-bg: #1a1a1a;
        }

        .dark-mode { 
            --bg: #121212; 
            --card-bg: #1e1e1e; 
            --text: #ffffff; 
            --border: #333; 
            --header-bg: #000000;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            transition: background 0.3s, color 0.3s; 
        }

        .card, .cart { 
            background: var(--card-bg); 
            max-width: 600px; 
            margin: auto; 
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 1px solid var(--border);
        }

        .header { 
            background: var(--header-bg); 
            color: var(--primary); 
            margin: -25px -25px 25px -25px; 
            padding: 20px; 
            text-align: center; 
            border-radius: 15px 15px 0 0;
        }

        .dark-toggle { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: var(--primary); 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 24px;
            z-index: 1000;
        }

        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        
        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            background: var(--card-bg); 
            color: var(--text); 
            font-size: 16px; 
            outline: none;
        }

        select:focus, input:focus { border-color: var(--primary); }

        .grid-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .btn-add { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            margin-top: 25px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid var(--primary); padding: 12px; text-align: left; font-size: 12px; color: #888; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .summary-box { 
            background: var(--header-bg); 
            color: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 25px; 
            text-align: center; 
        }

        .grand-total { font-size: 32px; color: var(--primary); font-weight: bold; display: block; }

        .btn-del { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 18px; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        .btn-wa { 
            background: #25D366; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
        }

        .btn-reset { 
            background: #666; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
        }

        @media print {
            .dark-toggle, .btn-add, .action-btns, .btn-del, .card { display: none; }
            body { background: white; padding: 0; }
            .cart { box-shadow: none; border: none; width: 100%; max-width: none; }
        }
    </style>
</head>
<body>

<div class="dark-toggle" onclick="toggleDarkMode()" title="Ganti Mode">🌓</div>

<div class="card">
    <div class="header">
        <h2 style="margin:0">BesiCalc v4 Pro 🏗️</h2>
        <small>Database Material & Estimator Berat</small>
    </div>

    <label>Jenis Material</label>
    <select id="jenisBesi" onchange="renderInputs()">
        <optgroup label="Besi Umum">
            <option value="beton">Besi Beton (Polos/Ulir)</option>
            <option value="hollow">Besi Hollow (Kotak)</option>
            <option value="pipa">Pipa Besi / Round Tube</option>
            <option value="siku">Besi Siku (L-Beam)</option>
        </optgroup>
        <optgroup label="Plat & Baja Berat">
            <option value="plat">Plat Besi Polos</option>
            <option value="bordes">Plat Bordes</option>
            <option value="wf">Baja WF / H-Beam</option>
            <option value="unp">Baja UNP</option>
            <option value="cnp">Baja CNP</option>
        </optgroup>
    </select>

    <div id="inputDynamic" class="grid-inputs"></div>

    <div class="grid-inputs">
        <div>
            <label>Panjang (m)</label>
            <input type="number" id="panjang" value="12">
        </div>
        <div>
            <label>Jumlah (Qty)</label>
            <input type="number" id="qty" value="1">
        </div>
    </div>

    <button class="btn-add" onclick="tambahKeDaftar()">+ TAMBAH KE DAFTAR</button>
</div>

<div class="cart" style="margin-top:25px;">
    <h3>📋 Daftar Hitungan</h3>
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Berat Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
    </table>

    <div class="summary-box">
        <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;">Total Berat Keseluruhan</span>
        <span id="totalBrt" class="grand-total">0.00 kg</span>
    </div>

    <div class="action-btns">
        <button class="btn-wa" onclick="bagikanWA()">📲 WhatsApp</button>
        <button class="btn-reset" onclick="hapusSemua()">🗑️ Reset</button>
    </div>
</div>

<script>
    // Inisialisasi Data dari Local Storage
    let list = JSON.parse(localStorage.getItem('besiListV4')) || [];
    let isDark = localStorage.getItem('darkModeV4') === 'true';

    function toggleDarkMode() {
        isDark = !isDark;
        document.body.classList.toggle('dark-mode', isDark);
        localStorage.setItem('darkModeV4', isDark);
    }

    const config = {
        beton: [{id: 'd', label: 'Diameter (mm)'}],
        hollow: [{id: 'w', label: 'Lebar (mm)'}, {id: 'h', label: 'Tinggi (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        pipa: [{id: 'd', label: 'Dia. Luar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        siku: [{id: 'l', label: 'Lebar Siku (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        plat: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        bordes: [{id: 't', label: 'Tebal (mm)'}, {id: 'l', label: 'Lebar (m)'}],
        wf: [{id: 'h', label: 'Tinggi H (mm)'}, {id: 'b', label: 'Lebar B (mm)'}, {id: 't1', label: 'Tebal Badan'}, {id: 't2', label: 'Tebal Sayap'}],
        unp: [{id: 'h', label: 'Tinggi (mm)'}, {id: 'b', label: 'Lebar (mm)'}, {id: 't', label: 'Tebal (mm)'}],
        cnp: [{id: 'h', label: 'Tinggi (mm)'}, {id: 'b', label: 'Lebar (mm)'}, {id: 't', label: 'Tebal (mm)'}]
    };

    function renderInputs() {
        const jenis = document.getElementById('jenisBesi').value;
        const container = document.getElementById('inputDynamic');
        container.innerHTML = '';
        config[jenis].forEach(inp => {
            container.innerHTML += `<div><label>${inp.label}</label><input type="number" id="${inp.id}" placeholder="0"></div>`;
        });
        // Default Panjang
        document.getElementById('panjang').value = (jenis === 'beton' || jenis === 'wf') ? 12 : 6;
    }
